		<script>
			(function () {
				const redirect = window.location.search.match(/[?&]p=([^&]+)/);

				if (!redirect) {
					return;
				}

				const restoredPath = decodeURIComponent(redirect[1]).replace(/~and~/g, '&');
				const restoredQuery = (window.location.search.match(/[?&]q=([^&]+)/)?.[1] || '').replace(/~and~/g, '&');
				const restoredHash = window.location.hash || '';
				const nextUrl = restoredPath + (restoredQuery ? `?${restoredQuery}` : '') + restoredHash;

				window.history.replaceState(null, '', nextUrl);
			})();
		</script>
